<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Паб Цегла — Меню</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brick:#A03820; --dark:#140C08; --neon:#E8FF47;
    --brick-mid:#7A2A14; --brick-lite:#C44828;
    --neon-glow:rgba(232,255,71,0.55); --cream:#F0E0C8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--dark);font-family:'Crimson Pro',serif;color:var(--cream);min-height:100vh;overflow-x:hidden}

  /* BRICK WALL */
  .brick-wall{position:fixed;inset:0;z-index:0;overflow:hidden}
  .brick-wall svg{width:100%;height:100%;opacity:.2}
  .brick-wall::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,255,71,.03) 0%,transparent 60%),linear-gradient(180deg,rgba(20,12,8,.55) 0%,rgba(20,12,8,.25) 40%,rgba(20,12,8,.75) 100%)}

  /* NEON TOP LINE */
  .neon-tube-top{position:fixed;top:0;left:0;right:0;height:3px;background:var(--neon);box-shadow:0 0 6px 2px var(--neon),0 0 22px 5px var(--neon-glow),0 0 60px 10px rgba(232,255,71,.15);z-index:10;animation:flicker 7s ease-in-out infinite}
  @keyframes flicker{0%,100%{opacity:1}91%{opacity:1}92%{opacity:.35}93%{opacity:1}97%{opacity:1}98%{opacity:.6}99%{opacity:1}}

  /* CONTAINER */
  .container{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:0 24px 80px}

  /* HEADER — entrance animation */
  @keyframes headerIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  .header{text-align:center;padding:54px 20px 30px;animation:headerIn .9s cubic-bezier(.22,1,.36,1) both}

  .neon-sign{display:inline-block;position:relative;padding:18px 32px 14px;margin-bottom:10px}
  .neon-sign::before,.neon-sign::after,.neon-sign .nf-h,.neon-sign .nf-b{content:'';position:absolute;background:var(--brick);box-shadow:0 0 8px 2px rgba(160,56,32,.6),0 0 20px 4px rgba(160,56,32,.25)}
  .neon-sign::before{top:0;left:10%;right:10%;height:2px}
  .neon-sign::after{bottom:0;left:10%;right:10%;height:2px}
  .neon-sign .nf-h{left:0;top:10%;bottom:10%;width:2px}
  .neon-sign .nf-b{right:0;top:10%;bottom:10%;width:2px}
  .neon-sign-text{font-family:'Playfair Display',serif;font-size:clamp(3rem,10vw,5.8rem);font-weight:900;font-style:italic;color:var(--neon);text-shadow:0 0 7px var(--neon),0 0 20px var(--neon),0 0 50px var(--neon-glow),0 0 100px rgba(232,255,71,.12);letter-spacing:-1px;line-height:1;animation:flicker 7s ease-in-out infinite}
  .neon-sign-word{display:block;font-size:clamp(.88rem,2.6vw,1.4rem);font-weight:600;font-style:normal;color:rgba(240,224,200,.35);letter-spacing:8px;text-transform:uppercase;margin-top:4px}
  .pub-subtitle{font-style:italic;color:rgba(240,224,200,.3);font-size:.88rem;letter-spacing:3px;margin-top:18px}
  .header-rule{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--brick-mid),var(--neon),var(--brick-mid),transparent);margin:20px 0 34px;opacity:.5}

  /* TABS — horizontal scroll, no wrap */
  .tabs{
    display:flex;flex-wrap:nowrap;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;
    scrollbar-width:none;
    border:1px solid rgba(160,56,32,.35);
    margin-bottom:40px;
    animation:headerIn .9s .12s cubic-bezier(.22,1,.36,1) both;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;
    background:none;border:none;border-right:1px solid rgba(160,56,32,.35);
    color:rgba(240,224,200,.4);font-family:'Crimson Pro',serif;
    font-size:.78rem;letter-spacing:2px;text-transform:uppercase;
    padding:12px 16px;cursor:pointer;
    transition:color .2s ease,background .2s ease;
    display:flex;align-items:center;justify-content:center;gap:7px;
    white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  .tab:last-child{border-right:none}
  .tab svg{width:15px;height:15px;fill:currentColor;flex-shrink:0;transition:filter .2s ease}
  .tab:hover{color:var(--cream);background:rgba(160,56,32,.15)}
  .tab.active{color:var(--neon);background:rgba(232,255,71,.05);text-shadow:0 0 10px var(--neon-glow),0 0 25px rgba(232,255,71,.15);animation:flicker 7s ease-in-out infinite}
  .tab.active svg{filter:drop-shadow(0 0 5px var(--neon))}

  /* SECTIONS */
  .menu-section{display:none}
  .menu-section.visible{display:block;animation:reveal .45s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes reveal{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .section-header{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .section-header svg{width:30px;height:30px;fill:var(--brick);flex-shrink:0;filter:drop-shadow(0 0 5px rgba(160,56,32,.5))}
  .section-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-style:italic;color:var(--cream)}
  .section-rule{flex:1;height:1px;background:linear-gradient(90deg,rgba(160,56,32,.5),transparent)}
  .sub-heading{font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:var(--brick-lite);margin:26px 0 8px 2px}
  .menu-grid{display:grid;gap:2px}

  /* MENU ITEM — stagger entrance animation */
  @keyframes itemIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .menu-item{
    background:rgba(20,12,8,.8);border-left:3px solid transparent;
    padding:15px 18px;display:grid;grid-template-columns:1fr auto;gap:3px 14px;
    cursor:pointer;
    transition:border-left-color .2s ease,background .2s ease;
    animation:itemIn .4s ease both;
    -webkit-tap-highlight-color:transparent;
  }
  .menu-item:hover,.menu-item.open{border-left-color:var(--neon);background:rgba(232,255,71,.04)}
  .item-name{font-family:'Playfair Display',serif;font-size:1.02rem;font-weight:700;color:var(--cream);grid-column:1;grid-row:1;transition:color .2s,text-shadow .2s}
  .menu-item:hover .item-name,.menu-item.open .item-name{color:var(--neon);text-shadow:0 0 10px rgba(232,255,71,.35)}
  .item-price{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--brick-lite);grid-column:2;grid-row:1;text-align:right;white-space:nowrap;transition:color .2s,text-shadow .2s}
  .menu-item:hover .item-price,.menu-item.open .item-price{color:var(--neon);text-shadow:0 0 8px var(--neon-glow)}
  .item-price small{font-size:.68rem;color:rgba(196,72,40,.55);font-family:'Crimson Pro',serif}
  .item-desc{color:rgba(240,224,200,.42);font-size:.87rem;font-style:italic;grid-column:1;grid-row:2;line-height:1.4}
  .item-badges{grid-column:1;grid-row:3;display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
  .badge{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border:1px solid;font-family:'Crimson Pro',serif}
  .badge-popular,.badge-new{border-color:var(--neon);color:var(--neon);text-shadow:0 0 6px var(--neon-glow)}
  .badge-recommend,.badge-hot{border-color:var(--brick-lite);color:var(--brick-lite)}
  .badge-muted{border-color:rgba(240,224,200,.2);color:rgba(240,224,200,.35)}

  /* ITEM EXTRA — smooth expand instead of display:none */
  .item-extra{
    grid-column:1/-1;
    font-size:.77rem;color:rgba(232,255,71,.4);
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .35s ease,opacity .25s ease,margin-top .25s ease,padding-top .25s ease;
    border-top:1px dashed rgba(232,255,71,.1);
  }
  .menu-item:hover .item-extra,.menu-item.open .item-extra{
    max-height:80px;opacity:1;margin-top:6px;padding-top:7px;
  }

  /* FOOTER */
  .footer{text-align:center;margin-top:54px;padding-top:22px;border-top:1px solid rgba(160,56,32,.2)}
  .footer p{color:rgba(240,224,200,.22);font-size:.8rem;font-style:italic;margin:3px 0}
  .footer-hint{margin-top:12px;font-size:.68rem;color:rgba(232,255,71,.18);letter-spacing:2px;text-transform:uppercase}

  .loading{text-align:center;padding:60px;color:rgba(232,255,71,.4);font-style:italic;letter-spacing:2px}

  /* ─── MOBILE ≤600px ─── */
  /* ITEM ADD BUTTON */
  .item-add{
    grid-column:2;grid-row:2;align-self:center;justify-self:end;
    width:28px;height:28px;background:rgba(232,255,71,.07);
    border:1px solid rgba(232,255,71,.25);color:rgba(232,255,71,.5);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .15s;flex-shrink:0;
    font-size:1.2rem;line-height:1;
    -webkit-tap-highlight-color:transparent;
  }
  .item-add:hover,.item-add:active{background:var(--neon);color:var(--dark);border-color:var(--neon)}
  @keyframes addPop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
  .item-add.pop{animation:addPop .22s ease}

  /* CART FAB */
  @keyframes fabIn{from{opacity:0;transform:scale(.7) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes fabBounce{0%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(.93)}100%{transform:scale(1)}}
  .cart-fab{
    position:fixed;bottom:28px;right:20px;z-index:80;
    width:54px;height:54px;background:var(--neon);border:none;
    display:none;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 4px 20px rgba(232,255,71,.35);
    transition:background .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .cart-fab.visible{display:flex;animation:fabIn .3s cubic-bezier(.22,1,.36,1) both}
  .cart-fab:active{background:#d4eb30}
  .cart-fab svg{width:22px;height:22px;fill:var(--dark)}
  .cart-fab-count{
    position:absolute;top:-6px;right:-6px;
    background:var(--brick);color:var(--cream);
    font-family:'Crimson Pro',serif;font-size:.72rem;font-weight:600;
    min-width:20px;height:20px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
    border:2px solid var(--dark);
  }
  .cart-fab.bump{animation:fabBounce .3s ease}

  /* CART OVERLAY + PANEL */
  .cart-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  .cart-overlay.open{opacity:1;pointer-events:auto}
  @keyframes cartUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .cart-panel{
    position:fixed;bottom:0;left:0;right:0;z-index:91;
    background:var(--panel);border-top:1px solid var(--border);
    max-height:80vh;display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);
  }
  .cart-panel.open{transform:translateY(0)}
  .cart-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .cart-head-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-style:italic;color:var(--cream)}
  .cart-head-close{background:none;border:none;color:rgba(240,224,200,.4);font-size:1.3rem;cursor:pointer;padding:4px;line-height:1}
  .cart-head-close:hover{color:var(--cream)}
  .cart-body{overflow-y:auto;flex:1;padding:8px 0}
  .cart-empty{text-align:center;padding:40px;color:rgba(240,224,200,.25);font-style:italic;font-size:.9rem}
  .cart-row{
    display:flex;align-items:center;gap:12px;
    padding:10px 20px;border-bottom:1px solid rgba(160,56,32,.1);
  }
  .cart-row-name{flex:1;font-family:'Playfair Display',serif;font-size:.9rem;color:var(--cream)}
  .cart-row-price{color:var(--brick-lite);font-family:'Playfair Display',serif;font-size:.9rem;white-space:nowrap;min-width:56px;text-align:right}
  .cart-qty{display:flex;align-items:center;gap:0;flex-shrink:0}
  .cart-qty-btn{
    width:26px;height:26px;background:rgba(160,56,32,.2);border:1px solid var(--border);
    color:rgba(240,224,200,.6);font-size:1rem;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .15s;
  }
  .cart-qty-btn:hover{background:rgba(160,56,32,.5);color:var(--cream)}
  .cart-qty-val{
    width:28px;text-align:center;font-family:'Crimson Pro',serif;
    font-size:.9rem;color:var(--cream);background:rgba(20,12,8,.5);
    border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    height:26px;display:flex;align-items:center;justify-content:center;
  }
  .cart-foot{
    padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;
    display:flex;align-items:center;gap:14px;
  }
  .cart-total{flex:1;font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream)}
  .cart-total span{color:var(--neon)}
  .cart-submit{
    background:var(--neon);color:var(--dark);border:none;
    font-family:'Crimson Pro',serif;font-size:.82rem;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;
    padding:11px 22px;cursor:pointer;transition:background .15s;
    flex-shrink:0;
  }
  .cart-submit:hover{background:#d4eb30}
  .cart-submit:active{background:#c8df2a}

  /* ─── MOBILE ≤600px ─── */
  @media(max-width:600px){
    .container{padding:0 12px 90px}
    .header{padding:40px 8px 16px}
    .neon-sign{padding:12px 18px 10px}
    .neon-sign-word{letter-spacing:5px}
    .pub-subtitle{letter-spacing:2px;font-size:.82rem}
    .header-rule{margin:14px 0 24px}
    .tabs{margin-bottom:26px}
    .tab{padding:10px 12px;font-size:.72rem;letter-spacing:1.5px;gap:5px}
    .tab svg{width:13px;height:13px}
    .section-title{font-size:1.45rem}
    .section-header{margin-bottom:18px}
    .section-header svg{width:24px;height:24px}
    .sub-heading{letter-spacing:3px}
    .menu-item{padding:12px 12px}
    .item-name{font-size:.96rem}
    .item-price{font-size:.98rem}
    .item-desc{font-size:.84rem}
    .footer{margin-top:36px}
    .footer-hint{display:none}
    .cart-fab{bottom:20px;right:16px}
  }
  @media(max-width:380px){
    .tab{font-size:.67rem;padding:9px 10px;letter-spacing:1px}
    .tab svg{display:none}
  }
</style>
</head>
<body>

<div class="brick-wall">
  <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
      <pattern id="bricks" x="0" y="0" width="128" height="54" patternUnits="userSpaceOnUse">
        <rect x="1"   y="1"  width="60" height="24" rx="1.5" fill="#8B2E18"/>
        <rect x="65"  y="1"  width="62" height="24" rx="1.5" fill="#952E1A"/>
        <rect x="2"   y="2"  width="58" height="3"  rx="1"   fill="rgba(255,180,120,0.06)"/>
        <rect x="66"  y="2"  width="60" height="3"  rx="1"   fill="rgba(255,180,120,0.06)"/>
        <rect x="1"   y="22" width="60" height="3"  fill="rgba(0,0,0,0.2)"/>
        <rect x="65"  y="22" width="62" height="3"  fill="rgba(0,0,0,0.2)"/>
        <rect x="-31" y="29" width="60" height="24" rx="1.5" fill="#A03820"/>
        <rect x="33"  y="29" width="60" height="24" rx="1.5" fill="#8B2E18"/>
        <rect x="97"  y="29" width="60" height="24" rx="1.5" fill="#952E1A"/>
        <rect x="-30" y="30" width="58" height="3"  rx="1"   fill="rgba(255,180,120,0.06)"/>
        <rect x="34"  y="30" width="58" height="3"  rx="1"   fill="rgba(255,180,120,0.06)"/>
        <rect x="-31" y="50" width="60" height="3"  fill="rgba(0,0,0,0.2)"/>
        <rect x="33"  y="50" width="60" height="3"  fill="rgba(0,0,0,0.2)"/>
        <rect x="0"   y="25" width="128" height="4" fill="#3A1A0A" opacity="0.9"/>
        <rect x="62"  y="1"  width="3" height="24"  fill="#3A1A0A" opacity="0.9"/>
        <rect x="30"  y="29" width="3" height="24"  fill="#3A1A0A" opacity="0.9"/>
        <rect x="94"  y="29" width="3" height="24"  fill="#3A1A0A" opacity="0.9"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#bricks)"/>
  </svg>
</div>

<div class="neon-tube-top"></div>

<div class="container">
  <div class="header">
    <div class="neon-sign">
      <span class="nf-h"></span><span class="nf-b"></span>
      <div class="neon-sign-text" id="pubName">Цегла</div>
      <div class="neon-sign-word" id="pubSubtitle">Паб</div>
    </div>
    <p class="pub-subtitle" id="pubAddress">з 1998 · вул. Ковальська, 7</p>
    <div class="header-rule"></div>
  </div>

  <div class="tabs" id="tabs"><div class="loading">завантаження меню…</div></div>
  <div id="sections"></div>

  <div class="footer">
    <p id="footerNote">Всі ціни вказані в гривнях, включно з ПДВ</p>
    <p id="footerCharges"></p>
    <p class="footer-hint" id="footerHint">наведи на позицію — дізнайся більше</p>
  </div>
</div>

<!-- CART FAB -->
<button class="cart-fab" id="cartFab" onclick="toggleCart()">
  <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
  <span class="cart-fab-count" id="cartCount">0</span>
</button>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-head">
    <div class="cart-head-title">Ваше замовлення</div>
    <button class="cart-head-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cartBody">
    <div class="cart-empty">Додайте позиції до замовлення</div>
  </div>
  <div class="cart-foot">
    <div class="cart-total">Разом: <span id="cartTotalVal">0 грн</span></div>
    <button class="cart-submit" onclick="placeOrder()">Замовити</button>
  </div>
</div>

<script>
const ICONS = {
  beer:  '<svg viewBox="0 0 24 24"><path d="M5 3h11l1 4H4zm-1 5h13l-1.2 12a1 1 0 01-1 .9H6.2a1 1 0 01-1-.9zm6 2a1 1 0 00-1 1v6a1 1 0 002 0v-6a1 1 0 00-1-1zm3 0a1 1 0 00-1 1v6a1 1 0 002 0v-6a1 1 0 00-1-1zm4-2h2a2 2 0 012 2v3a2 2 0 01-2 2h-1"/></svg>',
  fork:  '<svg viewBox="0 0 24 24"><path d="M18 3a3 3 0 00-3 3v6c0 1.1.9 2 2 2v7h2v-7a2 2 0 002-2V6a3 3 0 00-3-3zM7 3v7H5V3H3v7a4 4 0 003 3.87V21h2v-7.13A4 4 0 0011 10V3H7z"/></svg>',
  fire:  '<svg viewBox="0 0 24 24"><path d="M12 2C9.5 5.5 7 8 7 12a5 5 0 0010 0c0-2-1-3-2-4.5-.8 1.5-1.2 2.5-1.2 3.5a2 2 0 01-4 0c0-2 1-4 2.2-9z"/></svg>',
  shot:  '<svg viewBox="0 0 24 24"><path d="M6 3l1.5 12A2 2 0 009.5 17h5a2 2 0 002-1.88L18 3H6zm4.5 3h3l-.5 4h-2z"/></svg>',
  leaf:  '<svg viewBox="0 0 24 24"><path d="M12 3C9 5 7 8.5 8 12.5a4 4 0 008 0c.5-2-.5-3.5-1.5-5-.5 1.5-.5 2.5-.5 3a2 2 0 01-4 0c0-2.5 1-4.5 2-7.5z"/></svg>',
};

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ─── CART ────────────────────────────────────────────────
let cart = [];

function addToCart(id, name, price, unit) {
  const ex = cart.find(i => i.id === id);
  if (ex) { ex.qty++; } else { cart.push({ id, name, price, unit, qty: 1 }); }
  updateCartUI();
  // pulse the "+" button
  const btn = document.querySelector(`.item-add[data-id="${id}"]`);
  if (btn) { btn.classList.remove('pop'); btn.offsetHeight; btn.classList.add('pop'); }
  // bump the FAB
  const fab = document.getElementById('cartFab');
  fab.classList.remove('bump'); fab.offsetHeight; fab.classList.add('bump');
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  updateCartUI();
  renderCartBody();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const fab = document.getElementById('cartFab');
  document.getElementById('cartCount').textContent = total;
  if (total > 0) { fab.classList.add('visible'); }
  else { fab.classList.remove('visible'); closeCart(); }
}

function renderCartBody() {
  const body = document.getElementById('cartBody');
  const totalPrice = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotalVal').textContent = totalPrice + ' грн';
  if (!cart.length) {
    body.innerHTML = '<div class="cart-empty">Кошик порожній</div>';
    return;
  }
  body.innerHTML = cart.map(i => `
    <div class="cart-row">
      <div class="cart-row-name">${i.name}<br><small style="color:rgba(240,224,200,.3);font-size:.75rem;font-style:italic">${i.unit}</small></div>
      <div class="cart-qty">
        <button class="cart-qty-btn" onclick="changeQty('${i.id}',-1)">−</button>
        <div class="cart-qty-val">${i.qty}</div>
        <button class="cart-qty-btn" onclick="changeQty('${i.id}',1)">+</button>
      </div>
      <div class="cart-row-price">${i.price * i.qty} грн</div>
    </div>
  `).join('');
}

function toggleCart() {
  const open = document.getElementById('cartPanel').classList.contains('open');
  if (open) closeCart(); else openCart();
}
function openCart() {
  renderCartBody();
  document.getElementById('cartPanel').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}
function placeOrder() {
  const items = cart.map(i => `${i.name} ×${i.qty}`).join(', ');
  closeCart();
  cart = [];
  updateCartUI();
  renderCartBody();
  // Show confirmation toast-style
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1E1008;border:1px solid var(--neon);color:var(--neon);padding:14px 24px;font-family:Crimson Pro,serif;font-size:.9rem;letter-spacing:1px;z-index:200;text-align:center;max-width:90vw;animation:headerIn .4s ease both';
  el.textContent = '✓ Замовлення прийнято! Офіціант підійде до вас.';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function loadMenu() {
  const res = await fetch('/api/menu');
  const { categories, subcategories, items, settings } = await res.json();

  document.getElementById('pubName').textContent = settings.pubName || 'Цегла';
  document.getElementById('pubSubtitle').textContent = settings.pubSubtitle || 'Паб';
  document.getElementById('pubAddress').textContent = `з ${settings.since} · ${settings.address}`;
  document.getElementById('footerNote').textContent = settings.footerNote;
  document.getElementById('footerCharges').textContent =
    `Обслуговування: ${settings.serviceCharge}% при столику · Знижка на ДН: ${settings.birthdayDiscount}%`;
  if (isTouch) {
    document.getElementById('footerHint').textContent = 'натисни на позицію — дізнайся більше';
  }

  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = categories.map((cat, i) => `
    <button class="tab ${i===0?'active':''}" onclick="show('${cat.id}',this)">
      ${ICONS[cat.icon]||ICONS.beer} ${cat.name}
    </button>
  `).join('');

  // Sections
  const sectionsEl = document.getElementById('sections');
  sectionsEl.innerHTML = categories.map((cat, i) => {
    const catItems = items.filter(it => it.categoryId === cat.id);
    const catSubs  = subcategories.filter(s => s.categoryId === cat.id);

    let html = `<div id="${cat.id}" class="menu-section ${i===0?'visible':''}">
      <div class="section-header">
        ${ICONS[cat.icon]||ICONS.beer}
        <div class="section-title">${cat.name}</div>
        <div class="section-rule"></div>
      </div>`;

    if (catSubs.length) {
      catSubs.forEach(sub => {
        const subItems = catItems.filter(it => it.subcategoryId === sub.id);
        if (!subItems.length) return;
        html += `<div class="sub-heading">${sub.name}</div><div class="menu-grid">`;
        subItems.forEach(it => { html += renderItem(it); });
        html += '</div>';
      });
      const noSub = catItems.filter(it => !it.subcategoryId);
      if (noSub.length) {
        html += '<div class="menu-grid">';
        noSub.forEach(it => { html += renderItem(it); });
        html += '</div>';
      }
    } else {
      html += '<div class="menu-grid">';
      catItems.forEach(it => { html += renderItem(it); });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }).join('');

  applyStagger();

  // Clicks inside menu sections: "+" button OR tap to expand details
  document.getElementById('sections').addEventListener('click', e => {
    // Add-to-cart button
    const addBtn = e.target.closest('.item-add');
    if (addBtn) {
      e.stopPropagation();
      addToCart(addBtn.dataset.id, addBtn.dataset.name, Number(addBtn.dataset.price), addBtn.dataset.unit);
      return;
    }
    // Touch: tap item to expand extra info
    if (isTouch) {
      const item = e.target.closest('.menu-item');
      if (!item) return;
      const wasOpen = item.classList.contains('open');
      document.querySelectorAll('.menu-item.open').forEach(el => el.classList.remove('open'));
      if (!wasOpen) item.classList.add('open');
    }
  });
}

function applyStagger() {
  document.querySelectorAll('.menu-section').forEach(section => {
    section.querySelectorAll('.menu-item').forEach((el, i) => {
      el.style.animationDelay = `${i * 0.055}s`;
    });
  });
}

function renderItem(it) {
  const badgeClass = it.badge ? `badge-${it.badge}` : '';
  const badge = it.badge && it.badgeLabel ? `<span class="badge ${badgeClass}">${it.badgeLabel}</span>` : '';
  const nameEsc = it.name.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
  const unitEsc = it.unit.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
  return `<div class="menu-item">
    <div class="item-name">${it.name}</div>
    <div class="item-price">${it.price} <small>${it.unit}</small></div>
    <div class="item-desc">${it.description}</div>
    <button class="item-add" data-id="${it.id}" data-name="${nameEsc}" data-price="${it.price}" data-unit="${unitEsc}" title="Додати до замовлення">+</button>
    ${badge ? `<div class="item-badges">${badge}</div>` : ''}
    ${it.extra ? `<div class="item-extra">${it.extra}</div>` : ''}
  </div>`;
}

function show(id, btn) {
  document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.menu-item.open').forEach(el => el.classList.remove('open'));
  document.getElementById(id).classList.add('visible');
  btn.classList.add('active');
  // Re-trigger stagger animation for newly visible section
  const section = document.getElementById(id);
  section.querySelectorAll('.menu-item').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight; // force reflow
    el.style.animation = '';
  });
  applyStagger();
}

loadMenu();
</script>
</body>
</html>
